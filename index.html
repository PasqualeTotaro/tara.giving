<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tara Atkinson</title>
  <style>
    @font-face {
      font-family: 'Kenia';
      src: url('/fonts/Kenia-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #E35FBC;
    }
    .ta {
      position: relative;
      display: block;
      text-decoration: none;
      cursor: pointer;
      font-family: 'Kenia', system-ui, sans-serif;
      color: #FF0000;
      font-size: 40vw;
      line-height: 1;
      width: 0.9em;
      height: 1.4em;
      -webkit-text-stroke: 2px #9A9AFF;
      text-shadow:
        -2px -2px 0 #9A9AFF,
         2px -2px 0 #9A9AFF,
        -2px  2px 0 #9A9AFF,
         2px  2px 0 #9A9AFF;
         margin-top: 10%;
    }
    @media (max-aspect-ratio: 1/1) {
      .ta {
        -webkit-text-stroke: 1.0px #9A9AFF;
        text-shadow:
          -0.5px -0.5px 0 #9A9AFF,
           0.5px -0.5px 0 #9A9AFF,
          -0.5px  0.5px 0 #9A9AFF,
           0.5px  0.5px 0 #9A9AFF;
      }
    }
    .ta .letter {
      position: absolute;
      line-height: 1;
    }
    .ta .t {
      top: 0;
      left: 0;
    }
    .ta .a {
      bottom: 0;
      right: 0;
    }
  </style>
</head>
<body>
  <a class="ta" href="/wow">
    <span class="letter t">T</span>
    <span class="letter a">A</span>
  </a>
</body>
</html>
